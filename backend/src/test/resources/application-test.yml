spring:
  datasource:
    url: jdbc:h2:mem:streaming_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-jwt-signing-min-32-chars
    access-expiration-minutes: 15
    refresh-expiration-days: 7
  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: audio
    region: us-east-1
    presigned-url-expiration-minutes: 60
