spring:
  application:
    name: streaming-audio-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:streaming_audio}
    username: ${POSTGRES_USER:streaming}
    password: ${POSTGRES_PASSWORD:streaming_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${API_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:audio}
    region: ${S3_REGION:us-east-1}
    presigned-url-expiration-minutes: 60
  royalties:
    premium-weight: ${PESO_REGALIAS_PREMIUM:1.0}
    free-weight: ${PESO_REGALIAS_GRATIS:0.25}
    artist-cap-percentage: ${TOPE_ARTISTA_PORCENTAJE:0.20}
  upload:
    max-file-size-bytes: 52428800

springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    path: /api/v1/docs
